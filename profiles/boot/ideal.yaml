# FCT064 (2026-04-09): model id MUST match the plist --model argv exactly
# (`/Users/nesbitt/models/gemma-4-e4b-it-6bit`). Sending `mlx-community/...`
# triggers mlx_vlm's hot-reload codepath, which unloads local weights and
# attempts an unauthenticated HuggingFace fetch — HF is not part of our
# plumbing, and the fetch fails or leaves the server mid-load. See FCT064
# Root Cause 3 for a reproduced trace.
# FCT061 context: local MLX-VLM on :41961 (gemma-4-e4b-it-6bit).
model: /Users/nesbitt/models/gemma-4-e4b-it-6bit
provider: custom
base_url: http://127.0.0.1:41961/v1
# FCT061: v0.8.0 custom_providers block — required for CLI /model slash command
# to accept --provider custom:local-mlx. The top-level base_url above is what
# the gateway uses; this block is specifically so the interactive CLI can
# resolve a named custom provider via _get_named_custom_provider() in
# hermes_cli/runtime_provider.py:253-303.
# FCT064: explicit context_length overrides the 128000 fallback in
# model_metadata.py — at 0.50 threshold the compressor would otherwise never
# fire until 64k tokens, well past the Metal GPU Timeout crash point (~12k on
# E4B 6-bit). Setting it to 8192 fires compression at ~4096 tokens, which is
# transparent to the user (it summarizes old turns, conversation continues).
custom_providers:
  - name: local-mlx
    base_url: http://127.0.0.1:41961/v1
    api_mode: chat_completions
    models:
      /Users/nesbitt/models/gemma-4-e4b-it-6bit:
        context_length: 8192
fallback_providers: []
# max_tokens: "no artificial ceiling" marker. See ig88 profile for rationale.
max_tokens: 32768
toolsets: [terminal, file, code_execution]
agent:
  max_turns: 200  # FCT059: raised from 90 — IG-88 overnight burned ~25 iterations on a single path typo; budget pressure warnings at 70/90% still trigger at 140/180.
  tool_use_enforcement: none
terminal:
  backend: local
  cwd: /Users/nesbitt/dev/factory/agents/boot
  persistent_shell: true
display:
  compact: true
  streaming: false
  show_cost: false
memory:
  memory_enabled: false
  user_profile_enabled: false
approvals:
  mode: "off"
gateway: {}
# FCT060: Factory Conductor Webhook Memo Protocol.
# Route metadata only — NO secret field. The HMAC secret lives exclusively
# in the WEBHOOK_SECRET environment variable, injected by the wrapper from
# Infisical at startup and consumed by Hermes's native env-bridge path in
# gateway/config.py:842-855. Secret never touches disk. See docs/fct/FCT060.
platforms:
  webhook:
    enabled: true
    extra:
      host: 127.0.0.1
      rate_limit: 30
      max_body_bytes: 1048576
      routes:
        memo:
          prompt: |
            Factory Conductor memo from Chris (approved via HMAC signature): {message}

            After completing this memo, post your reply as a regular Matrix message in the Chris<>Boot DM room (room_id: !WBXxFNvnQlbsQywTta:matrix.org). The reply should be the actual answer or work product the memo asked for, not a meta-acknowledgement.
          deliver: log
# Auxiliary slots: route ALL auxiliary subsystems to the local mlx-vlm on
# :41961. Without these, auxiliaries default to provider=auto which falls
# through to OpenRouter with the local model path as the model ID (HTTP 400).
# See FCT055 + Kelk profile for full rationale.
auxiliary:
  vision:
    provider: custom
    base_url: http://127.0.0.1:41961/v1
    model: /Users/nesbitt/models/gemma-4-e4b-it-6bit
  web_extract:
    provider: custom
    base_url: http://127.0.0.1:41961/v1
    model: /Users/nesbitt/models/gemma-4-e4b-it-6bit
  compression:
    provider: custom
    base_url: http://127.0.0.1:41961/v1
    model: /Users/nesbitt/models/gemma-4-e4b-it-6bit
    summary_provider: custom
    summary_base_url: http://127.0.0.1:41961/v1
    summary_model: /Users/nesbitt/models/gemma-4-e4b-it-6bit
    # FCT064: fire compression at 50% of the declared context_length (8192).
    # Effective trigger ≈ 4096 tokens, well under the 12k Metal GPU Timeout.
    threshold: 0.50
  session_search:
    provider: custom
    base_url: http://127.0.0.1:41961/v1
    model: /Users/nesbitt/models/gemma-4-e4b-it-6bit
  skills_hub:
    provider: custom
    base_url: http://127.0.0.1:41961/v1
    model: /Users/nesbitt/models/gemma-4-e4b-it-6bit
  approval:
    provider: custom
    base_url: http://127.0.0.1:41961/v1
    model: /Users/nesbitt/models/gemma-4-e4b-it-6bit
  mcp:
    provider: custom
    base_url: http://127.0.0.1:41961/v1
    model: /Users/nesbitt/models/gemma-4-e4b-it-6bit
  flush_memories:
    provider: custom
    base_url: http://127.0.0.1:41961/v1
    model: /Users/nesbitt/models/gemma-4-e4b-it-6bit
mcp_servers:
  qdrant-mcp:
    url: http://localhost:41460/mcp
    connect_timeout: 10
  research-mcp:
    url: http://localhost:41470/mcp
    connect_timeout: 10
  graphiti:
