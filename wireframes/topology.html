/* ─── tiny primitives ────────────────────────────────────────────────── */
function glow(color, strength = 0.35) {
  return `0 0 12px ${color}${Math.round(strength * 255).toString(16).padStart(2,'0')}, 0 0 30px ${color}22`;
}

function hex2rgba(hex, a) {
  const r = parseInt(hex.slice(1,3),16);
  const g = parseInt(hex.slice(3,5),16);
  const b = parseInt(hex.slice(5,7),16);
  return `rgba(${r},${g},${b},${a})`;
}

/* ─── node card ──────────────────────────────────────────────────────── */
function Node({ color, label, sublabel, model, modelColor, trust, status, onClick, active, children }) {
  const [hov, setHov] = useState(false);

  const borderColor = (hov || active) ? color : 'rgba(255,255,255,0.08)';
  const bg = hov || active ? hex2rgba(color, 0.07) : 'rgba(13,17,23,0.95)';

  return (
    <div
      onClick={onClick}
      onMouseEnter={() => setHov(true)}
      onMouseLeave={() => setHov(false)}
      style={{
        position: 'relative',
        cursor: 'pointer',
        background: bg,
        border: `1px solid ${borderColor}`,
        borderRadius: 12,
        padding: '14px 16px',
        transition: 'all 0.2s ease',
        boxShadow: (hov || active) ? glow(color, 0.25) : 'none',
        minWidth: 160,
      }}
    >
      {/* status dot */}
      {status && (
        <span style={{
          position: 'absolute', top: 10, right: 10,
          width: 7, height: 7, borderRadius: '50%',
          background: status === 'live' ? '#22c55e' : status === 'blocked' ? '#ef4444' : '#f59e0b',
          boxShadow: status === 'live' ? '0 0 6px #22c55e' : 'none',
        }} />
      )}

      {/* accent line */}
      <div style={{ position: 'absolute', top: 0, left: 16, right: 16, height: 2, borderRadius: '0 0 2px 2px', background: color, opacity: hov || active ? 1 : 0.4, transition: 'opacity 0.2s' }} />

      <div style={{ fontSize: 11, fontWeight: 700, letterSpacing: '0.1em', textTransform: 'uppercase', color, marginBottom: 4 }}>
        {label}
      </div>
      {sublabel && (
        <div style={{ fontSize: 12, color: '#94a3b8', lineHeight: 1.4 }}>{sublabel}</div>
      )}
      {model && (
        <div style={{ marginTop: 6, display: 'flex', alignItems: 'center', gap: 5 }}>
          <div style={{ width: 6, height: 6, borderRadius: '50%', background: modelColor || '#60a5fa', flexShrink: 0 }} />
          <span style={{ fontSize: 10, fontFamily: "'JetBrains Mono', monospace", color: modelColor || '#60a5fa' }}>{model}</span>
        </div>
      )}
      {trust && (
        <div style={{ marginTop: 4, fontSize: 10, color: '#475569', fontFamily: "'JetBrains Mono', monospace" }}>{trust}</div>
      )}
      {children}
    </div>
  );
}

/* ─── connector line (SVG overlay) ──────────────────────────────────── */
function Arrow({ x1, y1, x2, y2, color, label, dashed, curved }) {
  const midX = (x1 + x2) / 2;
  const midY = (y1 + y2) / 2;

  const path = curved
    ? `M ${x1} ${y1} C ${x1} ${midY}, ${x2} ${midY}, ${x2} ${y2}`
    : `M ${x1} ${y1} L ${x2} ${y2}`;

  return (
    <g>
      <defs>
        <marker id={`arr-${color.replace('#','')}`} markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto">
          <path d="M 0 0 L 6 3 L 0 6 z" fill={color} />
        </marker>
      </defs>
      <path
        d={path}
        fill="none"
        stroke={color}
        strokeWidth={1.5}
        strokeDasharray={dashed ? '5 4' : undefined}
        strokeOpacity={0.6}
        markerEnd={`url(#arr-${color.replace('#','')})`}
      />
      {label && (
        <text x={midX + 4} y={midY - 4} fill={color} fontSize={9} fontFamily="JetBrains Mono, monospace" opacity={0.8}>{label}</text>
      )}
    </g>
  );
}

        position: 'sticky', top: 0, zIndex: 100,
      }}>
        <div style={{ display: 'flex', alignItems: 'center', gap: 14 }}>
          <div style={{
            width: 32, height: 32, borderRadius: 8,
            background: 'linear-gradient(135deg, #38bdf8, #818cf8)',
            display: 'flex', alignItems: 'center', justifyContent: 'center',
            fontSize: 14, fontWeight: 800, color: '#000',
          }}>F</div>
          <div>
            <div style={{ fontSize: 15, fontWeight: 700, color: '#e2e8f0' }}>Factory — System Topology</div>
            <div style={{ fontSize: 11, color: '#475569', fontFamily: "'JetBrains Mono', monospace" }}>FCT002 · 2026-03-16</div>
          </div>
        </div>
        <div style={{ display: 'flex', gap: 8 }}>
          {[
            { label: 'Boot', color: C.boot }, { label: 'IG-88', color: C.ig88 },
            { label: 'Kelk', color: C.kelk }, { label: 'Nan', color: C.nan },
          ].map(a => (
            <div key={a.label} style={{ display: 'flex', alignItems: 'center', gap: 4, fontSize: 10, color: a.color }}>
              <div style={{ width: 5, height: 5, borderRadius: '50%', background: a.color, boxShadow: `0 0 5px ${a.color}` }} />
              {a.label}
            </div>
          ))}
        </div>
      </header>

      {/* ── body ── */}
      <div style={{ flex: 1, display: 'flex', padding: '28px 32px', gap: 20, maxWidth: 1440, margin: '0 auto', width: '100%' }}>

        {/* ═══ LEFT COLUMN ══════════════════════════════════════════════ */}
        <div style={{ display: 'flex', flexDirection: 'column', gap: 16, flex: '0 0 220px' }}>

          {/* Chris */}
          <Node
            color={C.chris}
            label="Chris"
            sublabel="Operator / Principal"
            trust="Element · Matrix · SSH"
            active={isActive('chris')}
            onClick={() => select('chris')}
          >
            <div style={{ marginTop: 8, display: 'flex', gap: 4, flexWrap: 'wrap' }}>
              <Pill label="approval gate" color={C.chris} />
            </div>
          </Node>

          {/* Hardware */}
          <Section title="Hardware" color="#6b7280">
            <div style={{ display: 'flex', flexDirection: 'column', gap: 8 }}>
              <MachineBadge
                name="Whitebox"
                spec="Mac Studio M1 Max · 32GB · 400GB/s"
                color="#f59e0b"
                role="Primary inference · Ollama · Qdrant · Graphiti"
              />
              <MachineBadge
                name="Blackbox"
                spec="RP5 · Linux"
                color={C.coord}
                ip="100.87.53.109"
                role="coordinator-rs · Pantalaimon · watchdog"
              />
              <MachineBadge
                name="Cloudkicker"
                spec="MacBook Pro M2 · 16GB"
                color="#94a3b8"
                ip="100.86.68.16"
                role="Dev workstation · delegate sessions"
              />
              <MachineBadge
                name="R2D2"
                spec="iPhone · Element"
                color="#a78bfa"
                role="Matrix client · user mobile interface"
              />
            </div>
          </Section>

          {/* Memory */}
          <Node
            color={C.memory}
            label="Memory Layer"
            sublabel="Qdrant · Graphiti · FalkorDB"
            active={isActive('memory')}
            onClick={() => select('memory')}
          >
            <div style={{ marginTop: 10 }}>
              <MemRow name="Qdrant :41450" color="#818cf8" detail="Semantic search · PREFIX docs · research vault" />
              <MemRow name="Graphiti :41440" color="#a78bfa" detail="Temporal facts · entity relations · conv. memory" />
              <MemRow name="nomic-embed" color="#60a5fa" detail="Embeddings via Ollama · 0.1GB" />
            </div>
          </Node>

        </div>

        {/* ═══ CENTRE COLUMN ════════════════════════════════════════════ */}
        <div style={{ flex: 1, display: 'flex', flexDirection: 'column', gap: 16 }}>

          {/* coordinator-rs */}
          <Node
            color={C.coord}
            label="coordinator-rs"
            sublabel="Rust binary · 6046 lines · 13 modules · Blackbox"
            model="Zero LLM — deterministic routing only"
            modelColor={C.coord}
            status="live"
            active={isActive('coord')}
            onClick={() => select('coord')}
          >
            <div style={{ marginTop: 8, display: 'flex', gap: 4, flexWrap: 'wrap' }}>
              <Pill label="session lifecycle" color={C.coord} />
              <Pill label="approval pipeline" color={C.coord} />
              <Pill label="health checks 10s" color={C.coord} />
              <Pill label="timer dispatch" color={C.coord} />
            </div>
          </Node>

          {/* Permanent agents row */}
          <Section title="Permanent Agents — always-on" color="#e2e8f0" style={{ flex: '0 0 auto' }}>
            <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr 1fr 1fr', gap: 10 }}>

              <Node color={C.boot} label="Boot" sublabel="Ops · Dev · Delegation" model="Nanbeige4.1-3B Deep Sea" modelColor={C.nb} trust="L2 Advisor" status="live" active={isActive('boot')} onClick={() => select('boot')}>
                <div style={{ marginTop: 6, fontSize: 9, color: '#334155', fontFamily: 'monospace' }}>8bit MLX · 4.2GB</div>
                <div style={{ marginTop: 4 }}><Pill label="interim" color="#f59e0b" /></div>
              </Node>

              <Node color={C.ig88} label="IG-88" sublabel="Trading · Scanner · Market" model="Nanbeige4.1-3B Deep Sea" modelColor={C.nb} trust="L3 Operator" status="live" active={isActive('ig88')} onClick={() => select('ig88')}>
                <div style={{ marginTop: 6, fontSize: 9, color: '#334155', fontFamily: 'monospace' }}>8bit MLX · 4.2GB</div>
                <div style={{ marginTop: 4 }}><Pill label="backtest needed" color="#ef4444" /></div>
              </Node>

              <Node color={C.kelk} label="Kelk" sublabel="Personal · Conversational" model="Qwen3.5-4B Q6 MLX" modelColor={C.qwen} trust="L2 Advisor" status="live" active={isActive('kelk')} onClick={() => select('kelk')}>
                <div style={{ marginTop: 6, fontSize: 9, color: '#334155', fontFamily: 'monospace' }}>Q6 MLX · 3.4GB</div>
                <div style={{ marginTop: 4 }}><Pill label="interim" color="#f59e0b" /></div>
              </Node>

              <Node color={C.nan} label="Nan" sublabel="Observer · Triage · Routing" model="LFM2.5-1.2B Thinking" modelColor={C.lfm} trust="TBD trust" status="pending" active={isActive('nan')} onClick={() => select('nan')}>
                <div style={{ marginTop: 6, fontSize: 9, color: '#334155', fontFamily: 'monospace' }}>6bit MLX · 1.0GB</div>
                <div style={{ marginTop: 4 }}><Pill label="placeholder" color="#6366f1" /></div>
              </Node>

            </div>
          </Section>

          {/* Reasoning escalation */}
          <Section title="Reasoning Escalation Chain — Nan routes" color={C.nan}>
            <div style={{ display: 'flex', flexDirection: 'column' }}>
              <TierRow tier={0} label="coordinator-rs — deterministic, no LLM" color={C.coord} trigger="all routing" />
              <TierRow tier={1} label="Permanent Agents" color="#e2e8f0" model="Nanbeige 3B / Qwen3.5-4B" size="~3.4–4.2GB" trigger="routine tasks" />
              <TierRow tier={2} label="On-Demand Reasoning" color="#f59e0b" model="Qwen3.5-9B-Opus-Distilled" size="7.2GB · evicts expert pool" trigger="Nan escalation" />
              <TierRow tier={3} label="Anthropic API" color={C.api} model="Claude Sonnet 4.6 / Opus 4.6" size="cloud" trigger="Tier 2 insufficient" />
              <TierRow tier={4} label="Solo Intensive" color="#c084fc" model="Qwen3.5-27B-Opus-Distilled" size="16.7GB · suspend all agents" trigger="explicit user" />
            </div>
          </Section>

          {/* Expert pool */}
          <Node
            color={C.expert}
            label="Expert Subagent Pool"
            sublabel="One shared Qwen3.5-4B Q6 instance · 6 identities · ephemeral"
            active={isActive('expert')}
            onClick={() => select('expert')}
          >
            <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 8, marginTop: 10 }}>
              {[
                { name: 'Researcher', gate: 'no gate', status: 'live', metric: 'research_signal_density' },
                { name: 'Coder', gate: 'human ÷5 iters', status: 'pending', metric: 'test_pass_delta' },
                { name: 'Admin', gate: 'human before merge', status: 'pending', metric: 'approval_friction_rate' },
                { name: 'Policy', gate: 'human required', status: 'pending', metric: 'TBD' },
              ].map(e => (
                <div key={e.name} style={{
                  padding: '8px 10px',
                  background: 'rgba(45,212,191,0.05)',
                  border: '1px solid rgba(45,212,191,0.15)',
                  borderRadius: 8,
                }}>
                  <div style={{ fontSize: 11, fontWeight: 600, color: C.expert, marginBottom: 3 }}>{e.name}</div>
                  <div style={{ fontSize: 9, color: '#64748b', fontFamily: 'monospace' }}>{e.metric}</div>
                  <div style={{ fontSize: 9, color: '#334155', marginTop: 2 }}>{e.gate}</div>
                </div>
              ))}
            </div>
            <div style={{ marginTop: 10, padding: '8px 10px', background: 'rgba(139,92,246,0.05)', border: '1px solid rgba(139,92,246,0.15)', borderRadius: 8 }}>
              <div style={{ fontSize: 10, fontWeight: 600, color: '#a78bfa', marginBottom: 4 }}>Creative (human-gated, no autonomous loop)</div>
              <div style={{ fontSize: 10, color: '#475569' }}>Audio · Video · Music · Writing — no ungameable scalar metric</div>
            </div>
          </Node>

        </div>

        {/* ═══ RIGHT COLUMN ═════════════════════════════════════════════ */}
        <div style={{ flex: '0 0 260px', display: 'flex', flexDirection: 'column', gap: 16 }}>

          {/* Autonomous loops */}
          <Section title="Autonomous Loops" color="#6366f1">
            <LoopRow phase="Phase 1a" name="Researcher Loop" status="live" metric="research_signal_density" gate="no gate · 45min budget" />
            <LoopRow phase="Phase 1b" name="IG-88 Narrative Loop" status="blocked" metric="narrative_accuracy_rate" gate="BLOCKED: metric not operationalized" />
            <LoopRow phase="Phase 2" name="Boot Self-Improvement" status="pending" metric="approval_friction_rate" gate="human before merge · git branch per experiment" />
            <LoopRow phase="Phase 3" name="Research Swarm" status="deferred" metric="synthesis_coverage" gate="requires tokio::spawn in coordinator-rs" />
          </Section>

          {/* Anthropic API */}
          <Node
            color={C.api}
            label="Anthropic API"
            sublabel="Tier 3 · high-capability deliberate tier"
            model="Claude Sonnet 4.6 / Opus 4.6"
            modelColor={C.api}
            active={isActive('api')}
            onClick={() => select('api')}
          >
            <div style={{ marginTop: 8, fontSize: 10, color: '#475569', lineHeight: 1.5 }}>
              Not a fallback — reserved for genuinely hard problems.
              Frequent calls = Tier 1/2 misconfiguration signal.
            </div>
            <div style={{ marginTop: 8 }}><Pill label="autoscope (Sonnet)" color={C.api} /></div>
          </Node>

          {/* Memory budget */}
          <Section title="Memory Budget — Whitebox 24GB cap" color="#f59e0b">
            {[
              { label: 'Boot (Nanbeige)', size: 4.2, color: C.boot },
              { label: 'IG-88 (Nanbeige)', size: 4.2, color: C.ig88 },
              { label: 'Kelk (Qwen3.5-4B)', size: 3.4, color: C.kelk },
              { label: 'Nan (LFM2.5-1.2B)', size: 1.0, color: C.nan },
              { label: 'Expert pool (Qwen3.5-4B)', size: 3.4, color: C.expert },
              { label: 'Vision (LFM2.5-VL)', size: 1.4, color: '#f472b6' },
              { label: 'Audio (LFM2.5-Audio)', size: 1.3, color: '#fb923c' },
              { label: 'nomic-embed-text', size: 0.1, color: '#818cf8' },
            ].map(item => (
              <div key={item.label} style={{ marginBottom: 5 }}>
                <div style={{ display: 'flex', justifyContent: 'space-between', fontSize: 10, marginBottom: 2 }}>
                  <span style={{ color: '#94a3b8' }}>{item.label}</span>
                  <span style={{ color: item.color, fontFamily: 'monospace' }}>{item.size}GB</span>
                </div>
                <div style={{ height: 3, borderRadius: 2, background: 'rgba(255,255,255,0.05)' }}>
                  <div style={{ width: `${(item.size / 24) * 100}%`, height: '100%', borderRadius: 2, background: item.color, opacity: 0.7 }} />
                </div>
              </div>
            ))}
            <div style={{ marginTop: 8, padding: '6px 10px', background: 'rgba(245,158,11,0.08)', border: '1px solid rgba(245,158,11,0.2)', borderRadius: 6 }}>
              <div style={{ display: 'flex', justifyContent: 'space-between', fontSize: 10 }}>
                <span style={{ color: '#94a3b8' }}>Always-on total</span>
                <span style={{ color: '#f59e0b', fontFamily: 'monospace', fontWeight: 700 }}>~19.0GB</span>
              </div>
              <div style={{ display: 'flex', justifyContent: 'space-between', fontSize: 10, marginTop: 4 }}>
                <span style={{ color: '#64748b' }}>Peak (9B on-demand)</span>
                <span style={{ color: '#f59e0b', fontFamily: 'monospace' }}>~22.8GB</span>
              </div>
              <div style={{ display: 'flex', justifyContent: 'space-between', fontSize: 10, marginTop: 4 }}>
                <span style={{ color: '#334155' }}>Cap</span>
                <span style={{ color: '#475569', fontFamily: 'monospace' }}>24.0GB</span>
              </div>
            </div>
          </Section>

          {/* Open blockers */}
          <Section title="Critical Path" color="#ef4444">
            {[
              { text: 'Backtest IG-88 momentum strategy', urgent: true },
              { text: 'Operationalize narrative_accuracy_rate', urgent: true },
              { text: 'Benchmark Whitebox on arrival', urgent: false },
              { text: 'Implement LFM2.5 tool-call adapter (coordinator-rs)', urgent: false },
              { text: 'Register autoscope in agent-config.yaml', urgent: false },
              { text: 'Run autoscope → Researcher Loop Spec', urgent: false },
            ].map((item, i) => (
              <div key={i} style={{ display: 'flex', gap: 8, alignItems: 'flex-start', padding: '6px 0', borderBottom: '1px solid rgba(255,255,255,0.03)' }}>
                <div style={{
                  width: 5, height: 5, borderRadius: '50%', marginTop: 5, flexShrink: 0,
                  background: item.urgent ? '#ef4444' : '#334155',
                  boxShadow: item.urgent ? '0 0 6px #ef4444' : 'none',
                }} />
                <div style={{ fontSize: 11, color: item.urgent ? '#fca5a5' : '#64748b', lineHeight: 1.4 }}>{item.text}</div>
              </div>
            ))}
          </Section>

        </div>
      </div>

      {/* ── connection legend ── */}
      <div style={{ padding: '10px 32px 14px', borderTop: '1px solid rgba(255,255,255,0.04)', background: 'rgba(13,17,23,0.6)' }}>
        <ConnLegend />
      </div>

      {/* ── detail panel ── */}
      {panelData && (
        <DetailPanel node={panelData} onClose={() => setActiveNode(null)} />
      )}

    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
