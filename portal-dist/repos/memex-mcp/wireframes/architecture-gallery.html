<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>memex-mcp Architecture Gallery v0.1.0</title>
    <script src="https://cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.min.js"></script>
    <style>
        /* Input Sans */
        @font-face {
            font-family: 'InputSans-Regular';
            src: url('/fonts/InputSans-Regular.ttf') format('truetype');
            font-weight: 400;
            font-display: swap;
        }
        @font-face {
            font-family: 'InputSans-Medium';
            src: url('/fonts/InputSans-Medium.ttf') format('truetype');
            font-weight: 500;
            font-display: swap;
        }
        @font-face {
            font-family: 'InputSans-Bold';
            src: url('/fonts/InputSans-Bold.ttf') format('truetype');
            font-weight: 700;
            font-display: swap;
        }
        @font-face {
            font-family: 'InputSans-Light';
            src: url('/fonts/InputSans-Light.ttf') format('truetype');
            font-weight: 300;
            font-display: swap;
        }
        /* Input Mono */
        @font-face {
            font-family: 'InputMono-Regular';
            src: url('/fonts/InputMono-Regular.ttf') format('truetype');
            font-weight: 400;
            font-display: swap;
        }

        :root {
            --bg-primary: #1a1a1a;
            --bg-secondary: #242424;
            --bg-card: #2a2a2a;
            --accent: #4fc3f7;
            --accent-secondary: #0288d1;
            --text-primary: #eaeaea;
            --text-secondary: #a0a0a0;
            --border: #333;
            --success: #4ade80;
            --warning: #fbbf24;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'InputSans-Regular', 'Input Sans', system-ui, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            line-height: 1.6;
            min-height: 100vh;
        }

        .container {
            width: 100%;
            padding: 1rem 2rem;
        }

        /* Header - Minimal single line */
        header {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            margin-bottom: 0.5rem;
            padding: 0.5rem 0.75rem;
            background: var(--bg-secondary);
            border-radius: 6px;
            border: 1px solid var(--border);
        }

        header h1 {
            font-size: 1.5rem;
            font-weight: 700;
            background: linear-gradient(135deg, var(--accent) 0%, var(--accent-secondary) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .version-badge {
            background: var(--accent);
            color: white;
            padding: 0.15rem 0.4rem;
            border-radius: 3px;
            font-size: 0.7rem;
            font-weight: 600;
            margin-left: 1rem;
        }

        /* Quick Nav + Legend Row */
        .nav-legend-row {
            display: flex;
            gap: 0.35rem;
            margin: 0.75rem 0 1rem 0;
            flex-wrap: wrap;
            align-items: center;
        }

        .quick-nav {
            display: flex;
            gap: 0.3rem;
            padding: 0.25rem 0.5rem;
            background: var(--bg-secondary);
            border-radius: 4px;
            border: 1px solid var(--border);
            align-items: center;
        }

        .quick-nav a {
            color: var(--text-primary);
            text-decoration: none;
            padding: 0.2rem 0.5rem;
            background: var(--bg-card);
            border-radius: 3px;
            font-size: 0.8rem;
            transition: all 0.2s;
            border: 1px solid transparent;
        }

        .quick-nav a:hover {
            background: var(--accent);
            border-color: var(--accent);
        }

        /* Diagram Cards */
        .diagram-card {
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 16px;
            margin-bottom: 1.25rem;
            overflow: hidden;
            transition: border-color 0.2s;
            scroll-margin-top: 1.5rem;
            scroll-margin-bottom: 1.5rem;
        }

        .diagram-card:hover {
            border-color: var(--accent-secondary);
        }

        .diagram-header {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            padding: 0.8rem 1.5rem;
            background: var(--bg-card);
            cursor: pointer;
            user-select: none;
        }

        .diagram-header h2 {
            font-size: 1.25rem;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 0.75rem;
            flex: 1;
        }

        .diagram-badge {
            font-size: 0.9rem;
            padding: 0.3rem 0.6rem;
            background: var(--accent-secondary);
            border-radius: 6px;
            color: white;
        }

        .diagram-toggle {
            width: 36px;
            height: 36px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--bg-secondary);
            border-radius: 8px;
            transition: transform 0.3s;
            font-size: 1.5rem;
        }

        .diagram-card.collapsed .diagram-toggle {
            transform: rotate(-90deg);
        }

        .diagram-content {
            padding: 1.5rem;
            overflow-x: auto;
            transition: max-height 0.3s ease, padding 0.3s ease;
        }

        .diagram-card.collapsed .diagram-content {
            max-height: 0;
            padding-top: 0;
            padding-bottom: 0;
            overflow: hidden;
        }

        .diagram-description {
            color: var(--text-secondary);
            margin-bottom: 1rem;
            padding-bottom: 1rem;
            border-bottom: 1px solid var(--border);
            font-size: 0.95rem;
            font-family: 'InputSans-Light', 'Input Sans', system-ui, sans-serif;
            font-weight: 300;
        }

        .mermaid {
            background: var(--bg-primary);
            border-radius: 12px;
            padding: 1.5rem;
            min-height: 200px;
            overflow-x: auto;
            overflow-y: visible;
        }

        .mermaid svg {
            min-width: 900px;
            display: block;
            margin: 0 auto;
        }

        /* Color Legend - Compact inline */
        .legend {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 4px;
            padding: 0.3rem 0.5rem;
        }

        .legend h3 {
            font-size: 0.75rem;
            color: var(--text-secondary);
            white-space: nowrap;
        }

        .legend-grid {
            display: flex;
            gap: 0.6rem;
            flex-wrap: wrap;
        }

        .legend-item {
            display: flex;
            align-items: center;
            gap: 0.25rem;
            font-size: 0.75rem;
            color: var(--text-secondary);
        }

        .legend-color {
            width: 9px;
            height: 9px;
            border-radius: 2px;
            flex-shrink: 0;
        }

        /* Mermaid edge label styling - bubble cells */
        .mermaid .edgeLabel foreignObject {
            overflow: visible;
        }
        .mermaid .edgeLabel div {
            padding: 4px 10px;
            background: #1a2a3a !important;
            border-radius: 3px;
        }
        .mermaid .edgeLabel rect,
        .mermaid .labelBkg {
            fill: #1a2a3a !important;
            rx: 3px;
            ry: 3px;
        }

        /* Mermaid line and border thickness */
        .mermaid .flowchart-link,
        .mermaid .edgePath path,
        .mermaid .transition path {
            stroke-width: 2px !important;
        }
        .mermaid .node rect,
        .mermaid .node circle,
        .mermaid .node polygon,
        .mermaid .cluster rect,
        .mermaid .statediagram-state rect {
            stroke-width: 2px !important;
        }

        /* Mermaid node text - prevent clipping */
        .mermaid .cluster-label {
            white-space: nowrap;
            padding: 8px 12px;
        }
        .mermaid .cluster-label .nodeLabel {
            white-space: nowrap;
            padding: 4px 8px;
        }
        .mermaid .nodeLabel {
            white-space: nowrap;
        }
        .mermaid .label foreignObject {
            overflow: visible;
        }
        .mermaid .cluster rect {
            rx: 8px;
            ry: 8px;
        }
        /* Ensure cluster titles have breathing room */
        .mermaid .cluster .label {
            margin-bottom: 12px;
        }
        .mermaid .cluster foreignObject {
            overflow: visible;
        }

        /* Keyboard Hints */
        .keyboard-hints {
            position: fixed;
            bottom: 1rem;
            right: 1rem;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 0.5rem 0.75rem;
            font-size: 0.75rem;
            color: var(--text-secondary);
            z-index: 100;
            display: flex;
            flex-direction: column;
            gap: 0.35rem;
        }

        .keyboard-hints div {
            display: flex;
            align-items: center;
            gap: 0.4rem;
        }

        .keyboard-hints kbd {
            background: var(--bg-primary);
            padding: 0.15rem 0.4rem;
            border-radius: 3px;
            border: 1px solid var(--border);
            font-family: monospace;
            font-size: 0.7rem;
            min-width: 1.2rem;
            text-align: center;
        }

        /* Selected diagram card for keyboard nav */
        .diagram-card.selected {
            outline: 2px solid var(--accent);
            outline-offset: 2px;
        }

        /* Footer */
        footer {
            text-align: center;
            padding: 1.5rem;
            color: var(--text-secondary);
            font-size: 0.8rem;
            border-top: 1px solid var(--border);
            margin-top: 2rem;
        }

        footer a {
            color: var(--accent);
            text-decoration: none;
        }

        /* Responsive */
        @media (max-width: 900px) {
            .nav-legend-row {
                flex-direction: column;
                gap: 0.35rem;
                align-items: flex-start;
            }
            .mermaid svg {
                min-width: auto;
            }
        }

        @media (max-width: 600px) {
            .container { padding: 0.5rem; }
            header { padding: 0.4rem 0.6rem; }
            header h1 { font-size: 1rem; }
            .version-badge {
                font-size: 0.6rem;
                padding: 0.1rem 0.3rem;
                margin-left: 0.5rem;
            }
            .quick-nav {
                width: 100%;
                flex-wrap: wrap;
            }
            .quick-nav a {
                font-size: 0.7rem;
                padding: 0.15rem 0.4rem;
            }
            .legend {
                width: 100%;
                flex-wrap: wrap;
            }
            .legend h3 { font-size: 0.65rem; }
            .legend-item { font-size: 0.65rem; }
            .diagram-header {
                padding: 0.6rem 1rem;
                gap: 0.5rem;
            }
            .diagram-header h2 { font-size: 1rem; }
            .diagram-badge {
                font-size: 0.7rem;
                padding: 0.2rem 0.4rem;
            }
            .diagram-toggle {
                width: 28px;
                height: 28px;
                font-size: 1.2rem;
            }
            .diagram-content { padding: 1rem; }
            .diagram-description { font-size: 0.85rem; }
            .mermaid {
                padding: 1rem;
                overflow-x: auto;
                -webkit-overflow-scrolling: touch;
            }
            .mermaid svg {
                min-width: auto;
                max-width: none;
            }
            .keyboard-hints { display: none; }
            footer {
                padding: 1rem;
                font-size: 0.7rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>memex-mcp</h1>
            <span class="version-badge">v0.1.0</span>
        </header>

        <div class="nav-legend-row">
            <nav class="quick-nav">
                <!-- Add navigation links -->
            </nav>
            <div class="legend">
                <h3>Legend:</h3>
                <div class="legend-grid">
                    <!-- Add legend items -->
                </div>
            </div>
        </div>

        <!-- Add diagram cards -->

        <footer>
            <p>memex-mcp Architecture | Generated 2026-03-01</p>
        </footer>
    </div>

    <div class="keyboard-hints">
        <div><kbd>&uarr;</kbd><kbd>&darr;</kbd> Navigate</div>
        <div><kbd>&larr;</kbd> Collapse</div>
        <div><kbd>&rarr;</kbd> Expand</div>
        <div><kbd>Esc</kbd> Collapse all</div>
        <div><kbd>A</kbd> Expand all</div>
    </div>

    <script>
        // Initialize Mermaid with dark theme
        mermaid.initialize({
            startOnLoad: true,
            theme: 'dark',
            themeVariables: {
                fontFamily: '"InputMono-Regular", "SF Mono", "Fira Code", monospace',
                primaryColor: '#2a2a2a',
                primaryTextColor: '#eaeaea',
                primaryBorderColor: '#333',
                lineColor: '#4fc3f7',
                secondaryColor: '#1a1a1a',
                tertiaryColor: '#1a1a1a',
                background: '#1a1a1a',
                mainBkg: '#2a2a2a',
                nodeBorder: '#333',
                clusterBkg: '#242424',
                clusterBorder: '#333',
                titleColor: '#eaeaea',
                edgeLabelBackground: '#1a2a3a',
                lineWidth: 2
            },
            flowchart: {
                useMaxWidth: true,
                htmlLabels: true,
                curve: 'monotoneY',
                nodeSpacing: 80,
                rankSpacing: 100,
                padding: 30
            },
            stateDiagram: {
                useMaxWidth: true,
                nodeSpacing: 60,
                rankSpacing: 50
            }
        });

        // Keyboard navigation state
        let selectedIndex = -1;
        const cards = document.querySelectorAll('.diagram-card');

        function selectCard(index) {
            cards.forEach(c => c.classList.remove('selected'));
            if (index >= 0 && index < cards.length) {
                selectedIndex = index;
                cards[index].classList.add('selected');
                cards[index].scrollIntoView({ behavior: 'smooth', block: 'nearest' });
            }
        }

        function toggleDiagram(header) {
            const card = header.closest('.diagram-card');
            card.classList.toggle('collapsed');
            // Set as active for keyboard nav
            const index = Array.from(cards).indexOf(card);
            selectCard(index);
        }

        // Keyboard shortcuts
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') {
                cards.forEach(card => card.classList.add('collapsed'));
                cards.forEach(c => c.classList.remove('selected'));
                selectedIndex = -1;
            } else if (e.key.toLowerCase() === 'a' && !e.ctrlKey && !e.metaKey) {
                cards.forEach(card => card.classList.remove('collapsed'));
            } else if (e.key === 'ArrowDown') {
                e.preventDefault();
                selectCard(selectedIndex < cards.length - 1 ? selectedIndex + 1 : 0);
            } else if (e.key === 'ArrowUp') {
                e.preventDefault();
                selectCard(selectedIndex > 0 ? selectedIndex - 1 : cards.length - 1);
            } else if (e.key === 'ArrowRight' && selectedIndex >= 0) {
                e.preventDefault();
                cards[selectedIndex].classList.remove('collapsed');
            } else if (e.key === 'ArrowLeft' && selectedIndex >= 0) {
                e.preventDefault();
                cards[selectedIndex].classList.add('collapsed');
            }
        });

        // Smooth scroll for quick nav
        document.querySelectorAll('.quick-nav a').forEach(link => {
            link.addEventListener('click', (e) => {
                e.preventDefault();
                const target = document.querySelector(link.getAttribute('href'));
                if (target) {
                    target.scrollIntoView({ behavior: 'smooth', block: 'start' });
                    target.classList.remove('collapsed');
                    // Set as active for keyboard nav
                    const index = Array.from(cards).indexOf(target);
                    selectCard(index);
                }
            });
        });
    </script>
</body>
</html>
