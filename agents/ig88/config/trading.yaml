# IG-88 Trading Configuration
# Master config for backtesting and paper trading systems.
# Pairs lists are parameterized — update per Chris's preferences.

risk:
  kelly_fraction: 0.25            # Quarter-Kelly for first 200 trades
  kelly_fraction_graduated: 0.50  # Half-Kelly after 200+ validated
  max_position_pct: 10.0          # % of venue wallet per position (target 5%)
  daily_drawdown_halt_pct: 5.0    # Halt new entries at this daily loss %
  daily_drawdown_review_pct: 3.0  # Trigger review at this level
  max_portfolio_drawdown_pct: 20.0
  auto_execute_threshold_usd: 50  # Pending Decision D2 — $50 default

regime:
  # Score 0-10, mapped to three states
  risk_off_max: 3       # 0-3 = RISK_OFF
  neutral_max: 6        # 4-6 = NEUTRAL
  # 7-10 = RISK_ON

  # Input weights (sum to 1.0)
  weights:
    btc_trend: 0.25           # BTC 7-day price trend
    total_mcap_trend: 0.15    # Total crypto market cap trend
    fear_greed_index: 0.20    # Crypto Fear & Greed (cfgi.io)
    funding_rates: 0.15       # Aggregate perpetual funding rates
    stablecoin_flows: 0.10    # Net USDT/USDC mint/burn
    btc_dominance_delta: 0.10 # BTC dominance change (rising = risk-off signal)
    volatility_regime: 0.05   # GARCH conditional volatility state

venues:
  polymarket:
    enabled: true
    effort_pct: 40
    paper_mode: true          # MUST be true until graduation
    strategies:
      - calibration_arbitrage
      - base_rate_audit
    edge_threshold: 0.05      # Min |LLM_estimate - market_price| to trade
    confidence_min: 0.6
    max_open_positions: 5
    brier_target_50: 0.20     # Target at 50 trades
    brier_target_200: 0.15    # Target at 200 trades
    scan_interval_minutes: 5
    max_markets_per_scan: 50
    categories:
      prioritize: []          # Awaiting Chris input
      exclude: []             # Awaiting Chris input

  kraken_spot:
    enabled: true
    effort_pct: 20
    paper_mode: true
    # Pairs sourced from Chris's TradingView watchlists (2026-04-07)
    pairs:
      # BIG DOGS — macro + majors (always tracked)
      - BTC/USD
      - ETH/USDT
      # BAGS — active holdings / conviction positions
      - SOL/USDT
      - JUP/USDT
      - LINK/USDT
      - RENDER/USDT
      - POL/USDT       # ex-MATIC
      - HOT/USDT        # Holo
      - NEAR/USDT
      - THETA/USDT
      - AR/USDT
      - FIL/USDT
      - INJ/USDT
      - SEI/USDT
      - AKT/USDT        # Akash
      - IP/USDT
      - DYM/USDT         # Dymension
      - PYTH/USDT
      - TIA/USDT          # Celestia
      - UNI/USDT
      - FET/USDT          # ASI Alliance
      - GRT/USDT
      - W/USDT             # Wormhole
      - DOGE/USDT
      - WIF/USDT
      - BONK/USDT
      - MOODENG/USDT
      - KAS/USDT           # Kaspa
      # WATCH — tracking without position
      - XRP/USDT
      - AVAX/USDT
      - ORDI/USDT
      - TAO/USDT           # Bittensor
      - GTC/USDT           # Gitcoin
      - ATOM/USDT
      - OSMO/USDT
      - AUDIO/USDT          # Audius
    # Macro indicators (regime inputs, not tradeable)
    macro_indicators:
      - TOTAL               # Total crypto market cap
      - TOTAL3              # Alt market cap ex BTC/ETH
      - BTC.D               # BTC dominance
      - DXY                 # US Dollar Index
      - SPX                 # S&P 500
      - GOLD                # Gold
    # Pair tiers for position sizing
    pair_tiers:
      majors:               # Higher liquidity, tighter spreads
        - BTC/USD
        - ETH/USDT
        - SOL/USDT
      large_cap:            # Mid-tier liquidity
        - LINK/USDT
        - NEAR/USDT
        - UNI/USDT
        - AVAX/USDT
        - XRP/USDT
        - ATOM/USDT
        - FIL/USDT
        - INJ/USDT
        - RENDER/USDT
        - TAO/USDT
        - AR/USDT
        - FET/USDT
        - TIA/USDT
        - KAS/USDT
        - DOGE/USDT
      mid_cap:              # Lower liquidity, wider spreads
        - JUP/USDT
        - POL/USDT
        - HOT/USDT
        - THETA/USDT
        - SEI/USDT
        - AKT/USDT
        - IP/USDT
        - DYM/USDT
        - PYTH/USDT
        - GRT/USDT
        - W/USDT
        - WIF/USDT
        - BONK/USDT
        - MOODENG/USDT
        - ORDI/USDT
        - GTC/USDT
        - OSMO/USDT
        - AUDIO/USDT
    strategies:
      - event_driven
      - regime_momentum
    fees:
      maker_pct: 0.16
      taker_pct: 0.26
      prefer_limit_orders: true
    max_open_positions: 3
    min_hold_hours: 4          # Prevents churn through fees
    reentry_cooldown_hours: 2
    daily_loss_halt_pct: 3.0   # % of Kraken wallet
    taker_fee_alert_pct: 15.0  # Alert if taker fees >15% of gross P&L

  jupiter_perps:
    enabled: true
    effort_pct: 25
    paper_mode: true
    pairs:
      - SOL-PERP
      - AVAX-PERP
      - ETH-PERP
      - NEAR-PERP
      - LINK-PERP
      - BTC-PERP
    leverage:
      default: 2
      max: 3
    fees:
      open_close_pct: 0.07    # Each side
      round_trip_pct: 0.14    # Minimum; can reach 0.22% with price impact
      borrow_rate_hourly: true # Varies by utilization
    min_expected_move_pct: 0.01  # Lowered for MR paper trading
    max_open_positions: 6    # Allow multiple pairs
    min_hold_hours: 2
    max_hold_hours: 8
    tp_sl_required: true       # No naked positions
    borrow_fee_autoclose_pct: 50  # Auto-close when borrow fee hits 50% of TP
    edge_threshold: 0.01       # Lowered for MR paper trading

  solana_dex:
    enabled: true
    effort_pct: 15
    paper_mode: true
    phase: observation         # observation | paper_trading | live
    liquidity_min_usd: 200000
    max_new_positions_day: 4
    min_hold_hours: 2
    # Narrative categories — classification taxonomy
    narrative_categories:
      ai_agent:
        enabled: true
        historical_pump_duration_hours: 4
        typical_peak_multiple: 3.4
        typical_retracement_pct: 80
      political:
        enabled: true
        historical_pump_duration_hours: 6
        typical_peak_multiple: 5.0
        typical_retracement_pct: 90
      celebrity:
        enabled: false         # DO NOT ENTER — vault data shows negative returns
        blocked_reason: "Overwhelmingly negative historical returns"
      ecosystem:
        enabled: true
        historical_pump_duration_hours: 12
        typical_peak_multiple: 2.0
        typical_retracement_pct: 60
      animal_meme:
        enabled: true
        historical_pump_duration_hours: 3
        typical_peak_multiple: 4.0
        typical_retracement_pct: 85
      unclassified:
        enabled: false
        blocked_reason: "Insufficient data — blocked until return profile exists"
    watchlist: []              # Awaiting Chris input

graduation:
  min_trades: 200
  positive_expectancy: true    # E > 0 after costs
  significance_p: 0.10        # Binomial/t-test threshold
  geometric_return_positive: true  # Variance drag check
  max_paper_drawdown_pct: 15.0
  brier_target: 0.20          # Polymarket only
  greed_guardrails_verified: true
  chris_approval_required: true

kill_criteria:
  negative_expectancy_trades: 200     # Kill after 200+ trades at 95% CI
  variance_drag_fail: true            # Geometric return < 0
  consecutive_drawdown_halts: 3       # In 10-day window
  drawdown_halt_window_days: 10
